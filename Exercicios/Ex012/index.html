<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com html</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu servidor</p>
    <video controls width="560px" poster="imagem/vacaimg.png" autoplay controls loop>
        <source src="midia/videomp4.mp4" type="video/mp4">
        <source src="midia/videom4v.m4v" type="video/mp4">
        <source src="midia/videowebm.webm" type="video/webm">
        <source src="midia/videoogv.ogv" type="video/ogv">
        <p>Seu navegador nao possui compatibilidade com videos</p>
    </video>

    <h1>Inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/J-D0fiVBzo0?si=E2jbX4HGs47JLFJD" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</html>
