<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: birds;
            src: url(birds.ttf) format('opentype');      
            font-weight: normal;
            font-style: normal;     
        }
        /*
                Tipos de format()
                - opentype (otf)
                - trutype (ttf)
                - embedded-opentype
                - truetyoe-aat (Apple Advanced Topography)
                - svg
            */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: birds, Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Tempore ex, dicta accusamus repellat vitae eius, id minus fugit distinctio autem modi eaque magni perferendis pariatur, molestiae in ducimus tenetur eligendi.
    </p>
</body>
</html>
