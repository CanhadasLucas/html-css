<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>
        tente abrir essas imagens em diferentes dispositivos ou simplismente altere o tamanho do seu navegador
    </p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="Imgaem flexivel">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>
        vamos aprender a Reproduzir audios em HTML5.
    </p>

    <audio preload="metadata" controls loop>
        <source src="midia/musica.mp3" type="audio/mpeg">
        <p>Infelizmente seu navegador nao consegue reproduzir audio em mp3. <a href="midia/musica.mp3">Clique aqui para baixar</a>
        </p>
    </audio>

</body>
</html>
