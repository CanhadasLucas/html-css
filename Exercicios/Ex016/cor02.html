<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{ /* Configuracoes globais das CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(-45deg,  #6D14FE, #9C10F5, #FE0CC0, #FE2675, #FE721E, #FEA100);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
