<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 { /* BOX-LEVEL*/

            background-color: lightgray;
            height: 300px;
            width: 300px;
            /*
                border-width: 10px;
                border-style: solid;
                border-color: rgb(8, 83, 83);
            */

            border: 10px solid rgb(8, 83, 83) ;
            
            /*
                padding-top: 10px;
                padding-right: 10px;
                padding-bottom: 10px;
                padding-left: 10px;
            */

            /*padding: 10px 10px 10px 10px;*/
            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed salmon;

        }

        a { /*INLINE-LEVEL*/
            border: 10px solid red;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa BOX-LEVEL</h1>
    <p>
        Paragrafos tambem sao exemplos de BOX-LEVEL, mas os <a href="#">links sao exmplos de caixas INLINE-LEVEL </a>. Vamos ver como tudo isso funciona
    </p>
</body>
</html>
